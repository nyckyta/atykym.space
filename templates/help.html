<p class="mb-1">Available commands:</p>
<ol class="list-decimal list-inside ml-4 space-y-0.5">
    <li>help - print available commands</li>
    <li>cat &lt;file&gt; - prints content of the file</li>
    <li>ls [directory] - list files in the directory</li>
    <li>clear - clears the terminal to initial state</li>
</ol>
